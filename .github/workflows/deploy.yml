name: Build and Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # Job 1 : Build Angular sur un runner GitHub (rapide)
  # -------------------------------------------------------
  build:
    name: Build Angular (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Creer dossier environments
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: false, strapiUrl: '', strapiApiToken: '', emailJS: { serviceID: '', templateID: '', publicKey: '' } };" > src/environments/environment.ts

      - name: Build production
        run: npm run build:prod
        env:
          # Variables lues par scripts/build-env.js (noms exacts)
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}
          SERVICE_ID: ${{ secrets.SERVICE_ID }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/portfolio-frontend/browser/
          retention-days: 1

  # -------------------------------------------------------
  # Job 2 : Deploiement sur le NASPi (self-hosted runner)
  # Attend que le build soit termine avec succes
  # -------------------------------------------------------
  deploy:
    name: Deploy to NASPi (self-hosted)
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/frontend-dist

      - name: Deploy fichiers vers /srv/portfolio/frontend
        run: |
          rsync -a --delete /tmp/frontend-dist/ /srv/portfolio/frontend/

      - name: Restart conteneur nginx
        run: |
          docker restart portfolio_frontend

      - name: Nettoyage artifact temporaire
        if: always()
        run: |
          rm -rf /tmp/frontend-dist

      - name: Verification deploiement
        run: |
          echo "Statut conteneur portfolio_frontend :"
          docker inspect portfolio_frontend --format='{{.State.Status}}'
